openapi: 3.0.4
info:
  title: Росфоны — магазин российских смартфонов
  description: |
    REST API интернет-магазина "Росфоны", предоставляющее функционал:
    - Каталог смартфонов с фильтрацией и пагинацией
    - Управление корзиной покупок
    - Оформление и отслеживание заказов
    - Отзывы на смартфоны
  version: 1.0.0
  contact:
    name: Поддержка Росфоны
    email: support@rosphones.ru
  license:
    name: Proprietary

tags:
  - name: PhoneController
    description: Каталог смартфонов
  - name: CartController
    description: Корзина покупателя
  - name: OrderController
    description: Управление заказами
  - name: ReviewController
    description: Отзывы на смартфоны

paths:
  /phones:
    get:
      summary: Получить список смартфонов с пагинацией и фильтрацией
      tags:
        - PhoneController
      operationId: getAllPhones
      parameters:
        - name: page
          in: query
          description: Номер страницы (начиная с 0)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 0
        - name: size
          in: query
          description: Количество товаров на странице
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
            example: 12
        - name: brand
          in: query
          description: Фильтр по бренду
          required: false
          schema:
            type: string
            enum:
              - Росфон
              - Редми
              - Самсунг
              - Эппл
        - name: minPrice
          in: query
          description: Минимальная цена (₽)
          required: false
          schema:
            type: integer
            minimum: 0
            example: 10000
        - name: maxPrice
          in: query
          description: Максимальная цена (₽)
          required: false
          schema:
            type: integer
            example: 50000
        - name: ram
          in: query
          description: Объём оперативной памяти (ГБ)
          required: false
          schema:
            type: integer
            enum: [4, 6, 8, 12, 16]
        - name: sort
          in: query
          description: Сортировка
          required: false
          schema:
            type: string
            enum:
              - price_asc
              - price_desc
              - name_asc
              - rating_desc
            default: rating_desc
      responses:
        '200':
          description: Страница смартфонов
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    description: Список смартфонов на текущей странице
                    items:
                      $ref: '#/components/schemas/Phone'
                  totalElements:
                    type: integer
                    description: Всего смартфонов в каталоге
                    example: 156
                  totalPages:
                    type: integer
                    description: Всего страниц
                    example: 13
                  currentPage:
                    type: integer
                    description: Текущая страница (0-based)
                    example: 0
                  pageSize:
                    type: integer
                    description: Размер страницы
                    example: 12
        '400':
          description: Некорректные параметры фильтрации
    post:
      summary: Добавить новый смартфон (админка)
      tags:
        - PhoneController
      operationId: createPhone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneCreate'
      responses:
        '201':
          description: Смартфон добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Phone'
        '400':
          description: Ошибка валидации
        '403':
          description: Доступ только для администратора

  '/phones/{id}':
    get:
      summary: Получить смартфон по ID
      tags:
        - PhoneController
      operationId: getPhoneById
      parameters:
        - name: id
          in: path
          required: true
          description: ID смартфона
          schema:
            type: integer
            example: 101
      responses:
        '200':
          description: Смартфон найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneDetails'
        '404':
          description: Смартфон не найден

components:
  schemas:
    Phone:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 101
        brand:
          type: string
          enum: [Росфон, Редми, Самсунг, Эппл]
          example: "Росфон"
        model:
          type: string
          example: "R5 Pro"
        price:
          type: integer
          minimum: 1000
          maximum: 200000
          example: 34990
        rating:
          type: number
          minimum: 0
          maximum: 5
          readOnly: true
          example: 4.7
        imageUrl:
          type: string
          format: uri
          example: "https://rosfony.ru/images/r5pro.jpg"

    PhoneDetails:
      allOf:
        - $ref: '#/components/schemas/Phone'
        - type: object
          properties:
            specifications:
              type: object
              properties:
                ram:
                  type: integer
                  description: ОЗУ в ГБ
                  example: 8
                storage:
                  type: integer
                  description: Память в ГБ
                  example: 256
                camera:
                  type: string
                  example: "108 МП + 16 МП"
                battery:
                  type: integer
                  description: Ёмкость аккумулятора (мАч)
                  example: 5000
                processor:
                  type: string
                  example: "Росфон Чип M1"
                display:
                  type: string
                  description: Диагональ и тип экрана
                  example: "6.7 дюймов, AMOLED, 120Hz"
            inStock:
              type: integer
              description: Количество на складе
              example: 45
            colorOptions:
              type: array
              items:
                type: string
              example: ["Чёрный", "Белый", "Синий"]

    PhoneCreate:
      type: object
      required:
        - brand
        - model
        - price
      properties:
        brand:
          type: string
          enum: [Росфон, Редми, Самсунг, Эппл]
        model:
          type: string
          minLength: 1
          maxLength: 50
        price:
          type: integer
          minimum: 1000
          maximum: 200000
        specifications:
          type: object
        stock:
          type: integer
          minimum: 0
          default: 0

servers:
  - url: https://test-api.rosfony.ru/v1
    description: Тестовый сервер